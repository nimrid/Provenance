name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v26.0.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Noir
        uses: noir-lang/noirup@v0.1.3
        with:
          toolchain: "1.0.0-beta.9"

      - name: Install bb
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/refs/heads/next/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> $GITHUB_PATH
          $HOME/.bb/bbup -v 0.87.0

      - name: Cache cargo directories
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup environment
        run: ./scripts/setup.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build optimized contract Wasm
        run: stellar contract build --optimize

      - name: Build tornado contracts Wasm (wasm-cost)
        run: stellar contract build --optimize --features wasm-cost
        working-directory: contracts/tornado_classic/contracts

      - name: Build all circuits
        run: ./circuits/scripts/build_all.sh

      - name: Run workspace tests
        run: cargo test --workspace --verbose

      - name: Run integration tests
        run: RUST_TEST_THREADS=1 cargo test -p rs-soroban-ultrahonk --test integration_tests -- --nocapture
